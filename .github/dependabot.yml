version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    versioning-strategy: "increase-if-necessary"
    schedule:
      interval: "quarterly"
      time: "08:00"
      timezone: "Europe/Helsinki"
    cooldown:
      default-days: 1
    commit-message:
      prefix: "chore(deps)"
    labels:
      - "dependencies"
      - "pnpm"
    groups:
      updates:
        patterns:
          - "*"
        update-types:
          - "patch"
          - "minor"
      major-updates:
        patterns:
          - "*"
        update-types:
          - "major"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "quarterly"
      time: "09:00"
      timezone: "Europe/Helsinki"
    cooldown:
      default-days: 1
    commit-message:
      prefix: "chore(deps)"
    labels:
      - "dependencies"
      - "github-actions"
    groups:
      updates:
        patterns:
          - "*"
        update-types:
          - "patch"
          - "minor"
      major-updates:
        patterns:
          - "*"
        update-types:
          - "major"
