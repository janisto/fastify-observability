name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.1
        with:
          persist-credentials: false
      - name: Install pnpm
        uses: pnpm/action-setup@v6.0.9
        with:
          run_install: false
      - name: Install Node.js
        uses: actions/setup-node@v7.0.0
        with:
          node-version: "26"
          check-latest: true
          package-manager-cache: false
      - run: pnpm install --frozen-lockfile
      - run: pnpm check
      - run: pnpm typecheck
      - run: pnpm audit --prod

  test:
    name: Test Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ["24", "26"]
    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.1
        with:
          persist-credentials: false
      - name: Install pnpm
        uses: pnpm/action-setup@v6.0.9
        with:
          run_install: false
      - name: Install Node.js
        uses: actions/setup-node@v7.0.0
        with:
          node-version: ${{ matrix.node-version }}
          check-latest: true
          package-manager-cache: false
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:coverage

  build:
    name: Build package
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.1
        with:
          persist-credentials: false
      - name: Install pnpm
        uses: pnpm/action-setup@v6.0.9
        with:
          run_install: false
      - name: Install Node.js
        uses: actions/setup-node@v7.0.0
        with:
          node-version: "26"
          check-latest: true
          package-manager-cache: false
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm package:check

  e2e-image:
    name: Consumer image build
    if: >-
      github.event_name == 'pull_request' &&
      github.base_ref == 'main' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      startsWith(github.head_ref, 'release/prepare-v')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.1
        with:
          persist-credentials: false
      - name: Install just
        uses: extractions/setup-just@v4.0.0
      - name: Build consumer image
        run: just e2e-image observability-e2e-local:ci
