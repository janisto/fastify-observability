name: Publish to npm

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write # Required for npm trusted publishing; no registry token is used.
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: pnpm/action-setup@v6.0.9
        with:
          run_install: false
      - uses: actions/setup-node@v7.0.0
        with:
          node-version: "24"
          check-latest: true
          package-manager-cache: false
          registry-url: https://registry.npmjs.org/
      - run: pnpm install --frozen-lockfile
      - run: pnpm qa
      - name: Stage package on npm
        env:
          NPM_DIST_TAG: ${{ github.event.release.prerelease && 'next' || 'latest' }}
        run: npm stage publish --ignore-scripts --tag "$NPM_DIST_TAG"
